<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Alura do Blues - Dashboard Flow 3D</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('imagem.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px; 
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- PLAYER DE ÁUDIO (Agora Transparente) --- */
        .audio-top-panel {
            position: absolute;
            top: 20px;
            z-index: 10;
            /* Fundo totalmente transparente e sem bordas */
            background: transparent;
            border: none;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .track-info-top {
            color: var(--neon-blue);
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9); /* Sombra para o texto não sumir no fundo */
        }

        .audio-top-panel audio {
            height: 30px;
            /* Inverte as cores e aplica uma leve opacidade para mesclar com o fundo */
            filter: invert(100%) hue-rotate(180deg) brightness(1.5) opacity(0.85);
        }

        /* --- VÍDEO DO YOUTUBE --- */
        .video-3d-container {
            position: absolute;
            /* AJUSTE AQUI: Aumentei o top (desce) e diminuí o left (vai para a esquerda) */
            top: 26%; 
            left: 39.5%; 
            width: 310px; 
            height: 175px; 
            z-index: 5;
            
            transform: rotateY(-22deg) rotateX(10deg) skewY(-1deg);
            transform-style: preserve-3d;
            
            border: 2px solid rgba(0, 212, 255, 0.5); /* Borda mais discreta */
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            background: black;
            overflow: hidden;
        }

        .video-3d-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0.93; 
        }
    </style>
</head>
<body>

    <div class="audio-top-panel">
        <div class="track-info-top">O Blues do Dashboard - AI Blues Band</div>
        <audio id="player-musica" controls>
            <source src="musica.mp3" type="audio/mpeg">
            Seu navegador não suporta o elemento de áudio.
        </audio>
    </div>

    <div class="video-3d-container">
        <iframe 
            src="https://www.youtube.com/embed/9U4TO65DjgY?autoplay=0&mute=0" 
            title="Tutorial de IA" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
